# https://github.com/actions/virtual-environments/blob/main/images/macos/macos-11-Readme.md
# https://github.com/actions/runner-images/blob/main/images/macos/macos-12-Readme.md
# https://github.com/actions/cache/blob/ff937cc95032836a535d249de4ce2fc52aeae834/examples.md

name: Tests

on:
  pull_request:

jobs:
  spm:
    name: Swift Package Manager

    runs-on: macos-15-xlarge

    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v1

      - name: Read env
        run: cat .github/workflows/env.properties >> $GITHUB_ENV
        
      - name: Switch to Xcode ${{ env.xcode_version }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.xcode_version }}.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Uses version specified in .ruby_version
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Install xcodes
        run: brew install aria2 xcodesorg/made/xcodes

      - name: Install iOS 17.2
        run: sudo xcodes runtimes install "iOS 17.2"

      # Build

      - name: Build
        run: xcodebuild -scheme "Listable-Package" -destination "platform=iOS Simulator,OS=17.2,name=iPhone SE (3rd generation)" -sdk iphonesimulator build

  test-demo:
    name: "iOS ${{ matrix.sdk }}"

    runs-on: macos-15-xlarge
    
    env:
      TUIST_TEST_DEVICE: iPhone SE (3rd generation)
      TUIST_TEST_PLATFORM: iOS

    strategy:
      matrix:
        include:
          - sdk: "15.4"
            simctl_runtime: "com.apple.CoreSimulator.SimRuntime.iOS-15-4"
            installation_required: true

          - sdk: "16.2"
            simctl_runtime: "com.apple.CoreSimulator.SimRuntime.iOS-16-2"
            installation_required: true

          - sdk: "17.2"
            simctl_runtime: "com.apple.CoreSimulator.SimRuntime.iOS-17-2"
            installation_required: true

    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Read env
        run: cat .github/workflows/env.properties >> $GITHUB_ENV

      - name: Switch to Xcode ${{ env.xcode_version }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.xcode_version }}.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Uses version specified in .ruby_version
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Install xcodes
        if: ${{ matrix.installation_required }}
        run: brew install aria2 xcodesorg/made/xcodes

      - name: Install iOS ${{ matrix.sdk }}
        if: ${{ matrix.installation_required }}
        run: sudo xcodes runtimes install "iOS ${{ matrix.sdk }}"

      - name: Ensure sim exists
        run: |
          xcrun simctl create \
            "${{ env.TUIST_TEST_DEVICE }}" \
            "${{ env.TUIST_TEST_DEVICE }}" \
            "${{ matrix.simctl_runtime }}"

      - name: Install dependencies
        run: tuist install --path Demo

      - name: Build & Test
        run: tuist test --path Demo --os ${{ matrix.sdk }} DemoTests

  test-snapshot:
    name: "Snapshot ${{ matrix.sdk }}"

    runs-on: macos-15-xlarge
    steps:
      - uses: actions/checkout@v4
      
      - name: Build & Test Snapshot Package (iOS Simulator)
        run: |
          cd "Internal Pods/Snapshot"
          xcodebuild \
            -scheme Snapshot \
            -destination "platform=iOS Simulator,OS=${{ matrix.sdk }},name=${{ TUIST_TEST_DEVICE }}" \
            -enableCodeCoverage YES \
            build test
